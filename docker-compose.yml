services:
  web:
    build: .
    container_name: studyhub-web
    command: npm run start --workspace=studyhub
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  collab:
    build: .
    container_name: studyhub-collab
    command: npm run start --workspace=collab-server
    ports:
      - "1234:1234"
    env_file:
      - .env
    restart: unless-stopped