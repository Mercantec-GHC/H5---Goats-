services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: studyhub-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  collab:
    build:
      context: .
      dockerfile: Dockerfile.collab
    container_name: studyhub-collab
    ports:
      - "1234:1234"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:1234" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
