services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: studyhub-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  collab:
    build:
      context: .
      dockerfile: Dockerfile.collab
    container_name: studyhub-collab
    ports:
      - "1234:1234"
    env_file:
      - .env
    restart: unless-stopped
